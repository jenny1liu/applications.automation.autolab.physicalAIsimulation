name: Auto Create, Check, and Merge PR

on:
  push:
    branches-ignore:
      - main

jobs:
  auto-pr-process:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Process PR
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          # 1. Create the PR
          echo "Creating PR..."
          PR_URL=$(gh pr create \
            --title "Automated PR: ${{ github.ref_name }}" \
            --body "Auto-created, CI checked, and merged by GitHub Actions." \
            --base main \
            --head "${{ github.actor }}:${{ github.ref_name }}" \
            --repo jenny1liu/applications.automation.autolab.physicalAIsimulation)
          
          echo "PR created at $PR_URL"

          # 2. Wait for CI checks to pass
          # --wait 參數會持續輪詢直到所有 checks 通過或超時
          # --interval 設定輪詢間隔 (秒)
          echo "Waiting for CI checks to pass..."
          if gh pr checks "$PR_URL" --watch --interval 10; then
            echo "CI checks passed. Proceeding to merge."
            
            # 3. Merge the PR
            gh pr merge "$PR_URL" --merge --auto-delete-branch
          else
            echo "CI checks failed or timed out. Merge aborted."
            exit 1
          fi
